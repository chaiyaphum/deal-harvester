services:
  scraper:
    build: .
    environment:
      - CARD_RETRIEVAL_DATABASE_URL=${CARD_RETRIEVAL_DATABASE_URL}
      - CARD_RETRIEVAL_BROWSER_HEADLESS=false
    entrypoint: ["/app/entrypoint.sh"]
    command: []
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CARD_RETRIEVAL_DATABASE_URL=${CARD_RETRIEVAL_DATABASE_URL}
      - CARD_RETRIEVAL_API_KEYS=${CARD_RETRIEVAL_API_KEYS}
      - CARD_RETRIEVAL_BROWSER_HEADLESS=false
      - DISPLAY=:99
    entrypoint: ["/bin/bash", "-c", "Xvfb :99 -screen 0 1920x1080x24 &>/dev/null & exec card-retrieval serve"]
    command: []
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
